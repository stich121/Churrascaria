<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel de Reservas - Churrascaria Pampulha</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <div class="navbar-content">
                <div class="logo">
                    <a href="index.html">
                        <img src="Logo Branca carroça MC.png" alt="Churrascaria Pampulha" class="logo-img">
                    </a>
                </div>
                <button id="logoutBtn" class="btn-voltar-site" type="button"><i class="fa-solid fa-right-from-bracket"></i> Sair</button>
            </div>
        </div>
    </nav>

    <section class="painel-reservas">
        <div class="container">
            <h2>Painel de Reservas</h2>
            <p class="section-subtitle">Cadastre e acompanhe as reservas da casa</p>

            <div class="reserva-form-card">
                <form id="reservaForm">
                    <div class="reserva-form-grid">
                        <input type="text" id="resNome" placeholder="Nome do cliente" required>
                        <input type="tel" id="resTelefone" placeholder="Telefone" required>
                        <input type="date" id="resData" required>
                        <input type="time" id="resHora" required>
                        <input type="number" id="resPessoas" placeholder="Nº de pessoas" min="1" required>
                    </div>
                    <button type="submit" class="btn btn-primary">Adicionar Reserva</button>
                </form>
            </div>

            <div class="reservas-lista-wrapper">
                <table class="reservas-tabela">
                    <thead>
                        <tr>
                            <th>Cliente</th>
                            <th>Telefone</th>
                            <th>Data</th>
                            <th>Hora</th>
                            <th>Pessoas</th>
                            <th></th>
                        </tr>
                    </thead>
                    <tbody id="reservasTbody"></tbody>
                </table>
                <p id="reservasVazio" class="reservas-vazio">Nenhuma reserva cadastrada ainda.</p>
            </div>
        </div>
    </section>

    <script src="funcionario.js"></script>
</body>
</html>
